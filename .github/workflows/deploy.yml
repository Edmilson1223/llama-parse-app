name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # Para apenas warnings críticos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Test imports
      run: |
        python -c "import streamlit; import llama_parse; print('✓ Imports OK')"

    - name: Streamlit Cloud Deploy
      run: |
        echo "📤 Aplicação será auto-deployed ao Streamlit Cloud"
        echo "✓ A aplicação foi sincronizada com seu repositório"
