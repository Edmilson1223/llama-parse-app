version: '3.8'

services:
  llama-parse-app:
    build: .
    container_name: llama-parse-converter
    ports:
      - "8501:8501"
    environment:
      - LLAMA_PARSE_API_KEY=${LLAMA_PARSE_API_KEY:-llx-5Fq2oMo4Q43L6W69bCq5EEMxn57FT573OHfnVjhNF527N6us}
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ./docs:/app/docs
      - ./outputs:/app/outputs
    restart: unless-stopped
    networks:
      - llama-parse-network

networks:
  llama-parse-network:
    driver: bridge

# Como usar:
# 1. Construir a imagem: docker-compose build
# 2. Iniciar o contêiner: docker-compose up -d
# 3. Acessar em: http://localhost:8501
# 4. Parar o contêiner: docker-compose down
